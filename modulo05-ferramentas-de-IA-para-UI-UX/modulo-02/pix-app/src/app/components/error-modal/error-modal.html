<div class="modal-backdrop" (click)="close.emit()"></div>
<div class="modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="error-modal-title"
    aria-describedby="error-modal-message">
    <div class="modal-header">
        <h2 id="error-modal-title" class="modal-title">{{ title() }}</h2>
        <button #closeBtn class="close-button" aria-label="Fechar" (click)="close.emit()">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <div class="modal-body">
        <p id="error-modal-message" class="modal-message">{{ message() }}</p>
    </div>
</div>
